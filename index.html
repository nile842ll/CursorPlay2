<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jungle Quest — Map Adventure Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      cursor: none;
      user-select: none;
    }

    /* ── Sky ── */
    #sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        #87CEEB 0%,
        #b0e0f7 40%,
        #d4f0a0 70%,
        #5aad3a 100%
      );
      z-index: 0;
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      top: 40px;
      right: 120px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #fff9a0 30%, #FFD700 70%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 60px 30px rgba(255,220,0,0.4);
      z-index: 1;
      animation: sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 60px 30px rgba(255,220,0,0.4); }
      50%      { transform: scale(1.06); box-shadow: 0 0 80px 40px rgba(255,220,0,0.5); }
    }

    /* ── Clouds ── */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.88;
      z-index: 2;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud-1 { width:140px; height:50px; top:60px; left:-160px; animation: cloudDrift 28s linear infinite; }
    .cloud-1::before { width:70px; height:70px; top:-35px; left:20px; }
    .cloud-1::after  { width:55px; height:55px; top:-25px; left:65px; }

    .cloud-2 { width:100px; height:38px; top:100px; left:-120px; animation: cloudDrift 38s linear infinite 8s; }
    .cloud-2::before { width:55px; height:55px; top:-28px; left:12px; }
    .cloud-2::after  { width:40px; height:40px; top:-18px; left:52px; }

    .cloud-3 { width:120px; height:44px; top:35px; left:-140px; animation: cloudDrift 50s linear infinite 20s; }
    .cloud-3::before { width:62px; height:62px; top:-32px; left:15px; }
    .cloud-3::after  { width:48px; height:48px; top:-22px; left:60px; }

    @keyframes cloudDrift {
      from { left: -200px; }
      to   { left: 110vw; }
    }

    /* ── Jungle trees – back layer ── */
    #trees-back {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65%;
      z-index: 3;
      pointer-events: none;
    }

    /* ── Jungle trees – front layer ── */
    #trees-front {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      z-index: 5;
      pointer-events: none;
    }

    /* ── Ground ── */
    #ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(180deg, #5aad3a 0%, #3d8c2a 30%, #2d6b1e 100%);
      z-index: 6;
    }
    #ground::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 0;
      right: 0;
      height: 24px;
      background: radial-gradient(ellipse 30px 14px at center, #6dcf48 50%, transparent 100%);
      background-size: 60px 24px;
      background-repeat: repeat-x;
    }

    /* ── Brick wall ── */
    #brick-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 7;
      pointer-events: none;
    }

    /* ── Canvas ── */
    #gameCanvas {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      pointer-events: none;
    }

    #title-block {
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }
    #title-block h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      color: #fff;
      text-shadow:
        3px 3px 0 #2d6b1e,
        -2px -2px 0 #2d6b1e,
        2px -2px 0 #2d6b1e,
        -2px 2px 0 #2d6b1e,
        0 6px 20px rgba(0,0,0,0.5);
      letter-spacing: 2px;
      white-space: nowrap;
    }
    #title-block p {
      font-size: clamp(0.85rem, 2vw, 1.2rem);
      color: #fff9a0;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    #cta-btn {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: linear-gradient(180deg, #FFD700, #e6a000);
      border: 4px solid #8B5E00;
      border-radius: 14px;
      padding: 14px 44px;
      font-size: 1.3rem;
      font-weight: 900;
      color: #3a2000;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 0 #8B5E00, 0 10px 20px rgba(0,0,0,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      text-transform: uppercase;
      pointer-events: all;
    }
    #cta-btn:hover { transform: translateX(-50%) translateY(-3px); box-shadow: 0 9px 0 #8B5E00, 0 14px 24px rgba(0,0,0,0.4); }
    #cta-btn:active { transform: translateX(-50%) translateY(3px); box-shadow: 0 3px 0 #8B5E00, 0 6px 14px rgba(0,0,0,0.3); }

    #score-box {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(0,0,0,0.45);
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      padding: 8px 18px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      z-index: 20;
      pointer-events: none;
    }
    #score-box span { color: #FFD700; font-size: 1.3rem; }

    #hint {
      position: absolute;
      bottom: 190px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
      z-index: 20;
      pointer-events: none;
      animation: hintFade 3s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes hintFade {
      0%,100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    /* ── Vines ── */
    .vine {
      position: absolute;
      top: 0;
      width: 6px;
      background: linear-gradient(180deg, transparent, #2d8c2a 10%, #1a6b15);
      border-radius: 3px;
      z-index: 4;
      transform-origin: top center;
    }
    .vine::before {
      content: '🌿';
      position: absolute;
      font-size: 1.4rem;
    }

    /* ── Butterflies ── */
    .butterfly {
      position: absolute;
      font-size: 1.6rem;
      z-index: 8;
      animation: butterflyFloat linear infinite;
      pointer-events: none;
    }
    @keyframes butterflyFloat {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(30px,-20px) rotate(5deg); }
      50%  { transform: translate(-10px,-35px) rotate(-5deg); }
      75%  { transform: translate(-30px,-15px) rotate(8deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
  </style>
</head>

<!-- Butterflies -->

<div class="butterfly" style="top:50%;left:55%;animation-duration:7s;animation-delay:4s">🦋</div>
<div class="butterfly" style="top:35%;left:40%;animation-duration:9s;animation-delay:1s">🐦</div>

<script>
(function () {
  'use strict';
  const canvas  = document.getElementById('gameCanvas');
  const ctx     = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hintEl  = document.getElementById('hint');
  const ctaBtn  = document.getElementById('cta-btn');

  // ── Constants ─────────────────────────────────────────────
  const BRICK_W   = 68, BRICK_H = 28, BRICK_GAP = 4;
  const ROWS      = 4;
  const GROUND_H  = 80;
  const BALL_R    = 14;
  const BASE_SPD  = 7.5;
  // Fist hitbox ellipse radii
  const FIST_RX   = 38, FIST_RY = 28;

  // ── State ─────────────────────────────────────────────────
  let bricks        = [];
  let particles     = [];
  let floaters      = [];
  let score         = 0;
  let lives         = 3;
  let gameActive    = false;
  let frame         = 0;
  let ballSpeed     = BASE_SPD;
  let brickCooldown = 0;

  const livesEl = document.getElementById('lives-display');

  function updateLivesDisplay() {
    livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
  }

  function loseLife() {
    lives--;
    updateLivesDisplay();
    if (lives <= 0) {
      ball.active = false;
      gameActive  = false;
      // Show a game-over floater and re-show the play button after a delay
      addFloater(canvas.width / 2, canvas.height * 0.4, 'GAME OVER');
      setTimeout(() => {
        ctaBtn.style.display = '';
        ctaBtn.textContent   = 'Try Again';
      }, 1800);
    } else {
      // Brief pause then relaunch
      ball.active = false;
      addFloater(canvas.width / 2, my - 60, `${lives} left!`);
      setTimeout(launchBall, 900);
    }
  }

  // ── Mouse ─────────────────────────────────────────────────
  let mx = 400;
  // Fist is locked to a horizontal paddle lane above the bricks
  const FIST_LANE_RATIO = 0.45; // 45% down the screen
  let my = 0; // computed in resize and each frame

  function updateFistLane() { my = canvas.height * FIST_LANE_RATIO; }

  document.addEventListener('mousemove', e => { mx = e.clientX; });

  // ── Fist squash/stretch state ─────────────────────────────
  let fistSX = 1, fistSY = 1, fistFlash = 0;

  // ── Ball ──────────────────────────────────────────────────
  const ball = { x: 0, y: 0, vx: 0, vy: 0, active: false };

  // ── Canvas resize ─────────────────────────────────────────
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    updateFistLane();
    buildBricks();
  }
  window.addEventListener('resize', resize);

  // ── Bricks ────────────────────────────────────────────────
  function buildBricks() {
    bricks = [];
    const cols = Math.ceil(canvas.width / (BRICK_W + BRICK_GAP)) + 2;
    for (let row = 0; row < ROWS; row++) {
      const offset = row % 2 === 0 ? 0 : (BRICK_W + BRICK_GAP) / 2;
      const y = canvas.height - GROUND_H - (row + 1) * (BRICK_H + BRICK_GAP);
      for (let col = -1; col < cols; col++) {
        bricks.push({
          x: col * (BRICK_W + BRICK_GAP) - offset, y,
          w: BRICK_W, h: BRICK_H,
          alive: true, hue: Math.random() * 20 - 10,
        });
      }
    }
  }

  function brickCol(b, l) { return `hsl(${15 + b.hue},65%,${l}%)`; }

  function drawBrick(b) {
    if (!b.alive) return;
    const { x, y, w, h } = b;
    ctx.fillStyle = brickCol(b, 45); ctx.fillRect(x, y, w, h);
    ctx.fillStyle = brickCol(b, 60); ctx.fillRect(x, y, w, 5); ctx.fillRect(x, y, 4, h);
    ctx.fillStyle = brickCol(b, 32); ctx.fillRect(x, y+h-5, w, 5); ctx.fillRect(x+w-4, y, 4, h);
    ctx.strokeStyle = '#5a2a10'; ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  }

  // ── Ball rendering ────────────────────────────────────────
  function drawBall() {
    const { x, y } = ball, r = BALL_R;
    const glow = ctx.createRadialGradient(x, y, r*.1, x, y, r*2.6);
    glow.addColorStop(0, 'rgba(255,160,0,0.6)');
    glow.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(x, y, r*2.6, 0, Math.PI*2); ctx.fill();
    const body = ctx.createRadialGradient(x-r*.3, y-r*.35, r*.05, x, y, r);
    body.addColorStop(0, '#ffb030'); body.addColorStop(.5, '#e03000'); body.addColorStop(1, '#6a1200');
    ctx.fillStyle = body; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.42)';
    ctx.beginPath(); ctx.ellipse(x-r*.28, y-r*.3, r*.28, r*.17, -0.7, 0, Math.PI*2); ctx.fill();
  }

  // ── Fist (jungle-themed cartoon) ─────────────────────────
  function drawFist(cx, cy) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(fistSX, fistSY);

    const SKIN  = fistFlash > 0 ? '#fff9aa' : '#d4884a';
    const SDARK = '#8a4010';
    const LINE  = '#1a0800';
    const LW    = 2.8;

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(3, 40, 28, 9, 0, 0, Math.PI*2); ctx.fill();

    // ── Vine wristband ──────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    const [wx,wy,ww,wh,wbr] = [-22, 20, 46, 16, 5];
    ctx.moveTo(wx+wbr,wy); ctx.lineTo(wx+ww-wbr,wy);
    ctx.arcTo(wx+ww,wy,   wx+ww,wy+wbr,   wbr);
    ctx.lineTo(wx+ww,wy+wh-wbr);
    ctx.arcTo(wx+ww,wy+wh,wx+ww-wbr,wy+wh,wbr);
    ctx.lineTo(wx+wbr,wy+wh);
    ctx.arcTo(wx,wy+wh,   wx,wy+wh-wbr,   wbr);
    ctx.lineTo(wx,wy+wbr);
    ctx.arcTo(wx,wy,      wx+wbr,wy,       wbr);
    ctx.closePath();
    ctx.fillStyle = '#4a9c2a'; ctx.fill();
    ctx.strokeStyle = '#2d6b15'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.clip();                                       // stripe inside band only
    ctx.strokeStyle = '#7de040'; ctx.lineWidth = 1.5;
    for (let i = 0; i < 8; i++) {
      ctx.beginPath(); ctx.moveTo(wx+i*9-5, wy); ctx.lineTo(wx+i*9-14, wy+wh); ctx.stroke();
    }
    ctx.restore();

    // ── Thumb (behind palm) ─────────────────────────────────
    ctx.fillStyle = SKIN; ctx.strokeStyle = LINE; ctx.lineWidth = LW;
    ctx.beginPath();
    ctx.moveTo(-20, 4);
    ctx.bezierCurveTo(-24,  0, -44, -2, -40, -14);  // outer curve
    ctx.bezierCurveTo(-37, -23, -24, -19, -20, -10); // tip + inner
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // thumb knuckle crease
    ctx.strokeStyle = SDARK; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(-37, -8); ctx.bezierCurveTo(-33,-5,-28,-7,-26,-12); ctx.stroke();

    // ── Main fist body ──────────────────────────────────────
    // Knuckles face DOWNWARD (toward bricks/ball)
    const KY = 16;            // knuckle baseline y
    const KR = 9;             // knuckle arc radius
    const KC = [21, 7, -7, -21]; // knuckle x-centers: pinky→index

    // Gradient gives the body depth (lit top, shadowed bottom)
    const g = ctx.createLinearGradient(0, -28, 0, KY+KR);
    g.addColorStop(0,   fistFlash > 0 ? '#fffbcc' : '#e8a060');
    g.addColorStop(0.45,fistFlash > 0 ? '#fff5aa' : SKIN);
    g.addColorStop(1,   fistFlash > 0 ? '#ffe060' : SDARK);

    ctx.fillStyle = g; ctx.strokeStyle = LINE; ctx.lineWidth = LW;
    ctx.beginPath();
    // Back of hand (top) – slightly arched
    ctx.moveTo(-24, -22);
    ctx.bezierCurveTo(-14, -28,  14, -28,  24, -22);
    // Right side curving down to rightmost knuckle
    ctx.bezierCurveTo(28, -12,  28,  6,  KC[0]+KR, KY);
    // Four knuckle arcs — each arcs DOWNWARD from right to left
    for (let i = 0; i < 4; i++) {
      ctx.arc(KC[i], KY, KR, 0, Math.PI, false); // bulges toward bricks
      if (i < 3) ctx.lineTo(KC[i+1]+KR, KY);     // valley between knuckles
    }
    // Left side back up
    ctx.bezierCurveTo(-28, 6, -28, -12, -24, -22);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // ── Knuckle highlight circles ────────────────────────────
    KC.forEach(kx => {
      // Raised knuckle disc
      ctx.fillStyle = SKIN; ctx.strokeStyle = LINE; ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.arc(kx, KY+KR-1, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      // Specular shine
      ctx.fillStyle = fistFlash > 0 ? '#fffb80' : '#f0b878';
      ctx.beginPath(); ctx.arc(kx-1.5, KY+KR-3.5, 3, 0, Math.PI*2); ctx.fill();
    });

    // ── Finger crease lines (show curled fingers) ────────────
    ctx.strokeStyle = SDARK; ctx.lineWidth = 1.6;
    [-11, 1].forEach(ly => {
      ctx.beginPath();
      ctx.moveTo(-22, ly);
      ctx.bezierCurveTo(-13, ly-3, -7, ly+3,  0, ly);
      ctx.bezierCurveTo(  7, ly-3, 13, ly+3, 22, ly);
      ctx.stroke();
    });

    // ── Vertical finger dividers ─────────────────────────────
    ctx.strokeStyle = 'rgba(90,28,5,0.3)'; ctx.lineWidth = 1.2;
    [-14, 0, 14].forEach(lx => {
      ctx.beginPath(); ctx.moveTo(lx, -20); ctx.lineTo(lx+1, KY); ctx.stroke();
    });

    // ── Leaf accent ──────────────────────────────────────────
    ctx.fillStyle = '#3ad630'; ctx.strokeStyle = '#1e8c18'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.ellipse(28, -27, 11, 6, 0.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = '#2ab020'; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.moveTo(19,-25); ctx.lineTo(35,-29); ctx.stroke();

    // ── Hit flash ring ───────────────────────────────────────
    if (fistFlash > 0) {
      ctx.strokeStyle = `rgba(255,240,80,${fistFlash})`;
      ctx.lineWidth = 4 * fistFlash;
      ctx.beginPath(); ctx.arc(0, 0, 44+(1-fistFlash)*18, 0, Math.PI*2); ctx.stroke();
    }

    ctx.restore();
  }

  // ── Particles ─────────────────────────────────────────────
  function spawnExplosion(x, y, color) {
    for (let i = 0; i < 32; i++) {
      const a = Math.random()*Math.PI*2, s = 2.5+Math.random()*7.5;
      particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
        r:3+Math.random()*6, life:1, decay:.022+Math.random()*.03,
        color, type: Math.random()<.4?'star':'circle' });
    }
    particles.push({ x, y, vx:0, vy:0, r:0, life:1, decay:.055,
      color:'rgba(255,200,80,.9)', type:'ring', maxR:68 });
    for (let i = 0; i < 8; i++) {
      particles.push({ x:x+(Math.random()-.5)*32, y:y+(Math.random()-.5)*12,
        vx:(Math.random()-.5)*2, vy:-1-Math.random()*2.5,
        r:10+Math.random()*16, life:1, decay:.017+Math.random()*.013,
        color:'rgba(190,140,80,', type:'dust' });
    }
  }

  function spawnFistSpark(x, y) {
    for (let i = 0; i < 14; i++) {
      const a = -(Math.PI*.5)+(Math.random()-.5)*Math.PI, s = 4+Math.random()*7;
      particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
        r:2+Math.random()*4, life:.75, decay:.07+Math.random()*.05,
        color:'rgba(255,240,100,', type:'trail' });
    }
  }

  function updateParticles() {
    particles.forEach(p => {
      if (p.type !== 'ring') { p.x+=p.vx; p.y+=p.vy; if(p.type!=='dust') p.vy+=.18; p.vx*=.97; }
      p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);
  }

  function drawParticle(p) {
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
    if (p.type === 'ring') {
      const rad = p.maxR*(1-p.life);
      ctx.strokeStyle=p.color; ctx.lineWidth=5*p.life;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0,rad),0,Math.PI*2); ctx.stroke();
    } else if (p.type==='dust'||p.type==='trail') {
      ctx.fillStyle = p.color+Math.max(0,p.life).toFixed(2)+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.r*p.life),0,Math.PI*2); ctx.fill();
    } else if (p.type==='star') {
      ctx.fillStyle=p.color; ctx.translate(p.x,p.y); ctx.rotate(p.life*6);
      ctx.beginPath();
      for (let i=0;i<5;i++) {
        const a=i*Math.PI*2/5-Math.PI/2, bA=a+Math.PI/5;
        i===0?ctx.moveTo(Math.cos(a)*p.r,Math.sin(a)*p.r):ctx.lineTo(Math.cos(a)*p.r,Math.sin(a)*p.r);
        ctx.lineTo(Math.cos(bA)*p.r*.4,Math.sin(bA)*p.r*.4);
      }
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.r*p.life),0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ── Score floaters ────────────────────────────────────────
  function addFloater(x, y, text) {
    const big = text === 'GAME OVER';
    floaters.push({ x, y, text, life: 1, decay: big ? 0.005 : 0.016 });
  }

  function updateFloaters() {
    floaters.forEach(f => { f.y-=1.3; f.life-=f.decay; });
    floaters = floaters.filter(f => f.life > 0);
  }

  function drawFloaters() {
    floaters.forEach(f => {
      const big = f.text === 'GAME OVER';
      ctx.save(); ctx.globalAlpha = f.life;
      ctx.font = big ? 'bold 56px Georgia' : 'bold 22px Georgia';
      ctx.textAlign = 'center';
      ctx.lineWidth = big ? 6 : 3;
      ctx.strokeStyle = big ? '#600' : '#5a2a00';
      ctx.fillStyle   = big ? '#ff4444' : '#FFD700';
      ctx.strokeText(f.text, f.x, f.y);
      ctx.fillText(f.text, f.x, f.y);
      ctx.restore();
    });
  }

  // ── Physics helpers ───────────────────────────────────────
  function normSpeed() {
    const s = Math.hypot(ball.vx, ball.vy);
    if (s > 0) { ball.vx=(ball.vx/s)*ballSpeed; ball.vy=(ball.vy/s)*ballSpeed; }
  }

  // ── Fist collision — ellipse paddle ──────────────────────
  // Ball approaches from above (vy>0), fist sends it back down toward bricks.
  // Angle is determined by horizontal hit offset, giving breakout-style aiming.
  function checkFistHit() {
    const ex = FIST_RX + BALL_R, ey = FIST_RY + BALL_R;
    const dx = (ball.x - mx) / ex, dy = (ball.y - my) / ey;
    if (dx*dx + dy*dy > 1) return false;

    // Horizontal offset −1..1 maps to bounce angle
    const offset   = Math.max(-1, Math.min(1, (ball.x - mx) / FIST_RX));
    const maxAng   = Math.PI * 0.40;
    const ang      = offset * maxAng;

    // Always deflect ball downward (toward bricks)
    ball.vx = Math.sin(ang) * ballSpeed;
    ball.vy = Math.max(4, Math.cos(ang) * ballSpeed);

    // Eject ball cleanly below fist
    ball.x = mx + Math.sin(ang) * (FIST_RX + BALL_R + 2);
    ball.y = my + (FIST_RY + BALL_R + 3);

    fistSX = 1.4; fistSY = 0.65; fistFlash = 1;
    spawnFistSpark(ball.x, ball.y - 6);
    return true;
  }

  // ── Brick collision — one brick, face-accurate, CCD-safe ──
  function checkBrickHit() {
    if (brickCooldown > 0) { brickCooldown--; return false; }

    // Find the overlapping brick with smallest distance (closest hit)
    let best = null, bestDist = Infinity;
    for (const br of bricks) {
      if (!br.alive) continue;
      const nearX = Math.max(br.x, Math.min(ball.x, br.x+br.w));
      const nearY = Math.max(br.y, Math.min(ball.y, br.y+br.h));
      const dx = ball.x-nearX, dy = ball.y-nearY;
      const d = dx*dx + dy*dy;
      if (d < BALL_R*BALL_R && d < bestDist) { bestDist=d; best=br; }
    }
    if (!best) return false;

    // Determine collision face via axis penetration depth
    const cx = best.x+best.w*.5, cy = best.y+best.h*.5;
    const dx = ball.x-cx,        dy = ball.y-cy;
    const penX = (best.w*.5+BALL_R) - Math.abs(dx);
    const penY = (best.h*.5+BALL_R) - Math.abs(dy);

    if (penX < penY) {
      // Side hit
      ball.vx = dx>0 ? Math.abs(ball.vx) : -Math.abs(ball.vx);
      ball.x  = cx + (dx>0?1:-1)*(best.w*.5+BALL_R+1);
    } else {
      // Top / bottom hit — always send ball back toward fist (upward)
      ball.vy = -Math.abs(ball.vy);
      ball.y  = cy + (dy>0?1:-1)*(best.h*.5+BALL_R+1);
    }
    normSpeed();

    // Destroy
    best.alive = false;
    score += 10;
    scoreEl.textContent = score;
    addFloater(best.x+best.w/2, best.y, '+10');
    spawnExplosion(best.x+best.w/2, best.y+best.h/2, brickCol(best, 45));

    ballSpeed      = Math.min(ballSpeed * 1.05, BASE_SPD * 2.4);
    brickCooldown  = 10;
    return true;
  }

  // ── Ball update (sub-stepped CCD) ────────────────────────
  function updateBall() {
    if (!ball.active) return;

    const steps = Math.max(1, Math.ceil(Math.hypot(ball.vx, ball.vy) / 8));
    const svx = ball.vx/steps, svy = ball.vy/steps;

    for (let s = 0; s < steps; s++) {
      ball.x += svx; ball.y += svy;

      // Walls
      if (ball.x-BALL_R < 0)            { ball.x=BALL_R;              ball.vx= Math.abs(ball.vx); normSpeed(); }
      if (ball.x+BALL_R > canvas.width) { ball.x=canvas.width-BALL_R; ball.vx=-Math.abs(ball.vx); normSpeed(); }
      if (ball.y-BALL_R < 0)            { ball.y=BALL_R;              ball.vy= Math.abs(ball.vy); normSpeed(); }

      // Ball flew above the fist lane = out of bounds, lose a life
      if (ball.y + BALL_R < my - FIST_RY - 10) { loseLife(); return; }

      // Ball fell below the screen (shouldn't normally happen)
      if (ball.y > canvas.height + 60) { loseLife(); return; }

      // Fist has priority over bricks
      if (checkFistHit()) break;
      if (checkBrickHit()) break;
    }

    // Fire trail
    if (frame % 2 === 0) {
      particles.push({ x:ball.x, y:ball.y,
        vx:(Math.random()-.5), vy:(Math.random()-.5),
        r:BALL_R*(.3+Math.random()*.4), life:.5, decay:.055,
        color:'rgba(255,120,20,', type:'trail' });
    }
  }

  // ── Launch ball from fist position ────────────────────────
  function launchBall() {
    ballSpeed  = BASE_SPD;
    ball.active = true;
    ball.x = mx;
    ball.y = my + FIST_RY + BALL_R + 4;

    // Aim toward a random column in the brick wall, always downward
    const topBrickY = canvas.height - GROUND_H - ROWS*(BRICK_H+BRICK_GAP) - 20;
    const tx = canvas.width * (.25 + Math.random()*.5);
    const ty = topBrickY;
    const dist = Math.hypot(tx-ball.x, ty-ball.y) || 1;
    ball.vx = (tx-ball.x)/dist * ballSpeed;
    ball.vy = Math.abs((ty-ball.y)/dist * ballSpeed); // always downward
    brickCooldown = 0;
  }

  // ── Fist animation decay ──────────────────────────────────
  function updateFist() {
    fistSX   += (1-fistSX) * 0.22;
    fistSY   += (1-fistSY) * 0.22;
    fistFlash = Math.max(0, fistFlash - 0.08);
    if (Math.abs(fistSX-1) < .002) fistSX = 1;
    if (Math.abs(fistSY-1) < .002) fistSY = 1;
  }

  // ── Buttons ───────────────────────────────────────────────
  ctaBtn.addEventListener('click', e => {
    e.stopPropagation();
    ctaBtn.style.display = 'none';
    ctaBtn.textContent   = 'Play Now';
    hintEl.style.display = 'none';
    bricks.forEach(b => { b.alive = true; });
    particles = []; floaters = [];
    score = 0; scoreEl.textContent = '0';
    lives = 3; updateLivesDisplay();
    ballSpeed  = BASE_SPD;
    gameActive = true;
    launchBall();
  });

  // ── Main loop ─────────────────────────────────────────────
  function loop() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateFistLane();
    if (gameActive) updateBall();
    updateFist();
    updateParticles();
    updateFloaters();

    bricks.forEach(drawBrick);

    // Paddle lane track line
    if (gameActive) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 14]);
      ctx.beginPath(); ctx.moveTo(0, my); ctx.lineTo(canvas.width, my); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    particles.filter(p => p.type==='trail'||p.type==='dust').forEach(drawParticle);
    if (ball.active) drawBall();
    particles.filter(p => p.type!=='trail'&&p.type!=='dust').forEach(drawParticle);
    drawFloaters();
    drawFist(mx, my);   // always drawn last — replaces cursor

    requestAnimationFrame(loop);
  }

  // ── Boot ──────────────────────────────────────────────────
  resize();
  loop();
})();
</script>
</body>
</html>
